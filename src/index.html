<!DOCTYPE html>
<html>
  <head>
    <title>ESM MIME type checker</title>
    <meta
      name='viewport'
      content='width=device-width, initial-scale=1'
    >
    <meta name="description" content="Verify how your browser handles module MIME types. Test ESM and CSS import security, strictness, and standards compliance in real-time.">
    <style>
      :root, body {
        width: -webkit-fill-available; width: stretch;
        height: -webkit-fill-available; height: stretch;
      }
      
      :root {
        text-align: center;
        color-scheme: dark;
        font-family: system-ui;
        position: fixed;
        font-size: 1em;
      }
      
      body {
        padding: 0px;
        margin: 0px;
      }
      body > * {
        display: block;
      }
      #copyright {
        font-size: 0.8em;
        margin-top: 10px;
      }
      body, #list {
        display: flex;
        align-items: center;
        justify-content: center;
      }
      body {
        flex-direction: column;
      }
      @media (max-aspect-ratio: 1/1) {
        #list {
          flex-direction: column;
        }
      }
      #list {
        overflow: clip;
      }
      #list > .panel {
        border: 1px solid #fff8;
        border-radius: 3px;
        margin: 5px;
      }
      #list > .panel > #display-name {
        background-color: #fff2;
      }
      #list > .panel > #display-name,
      #list > .panel > #content > * {
        display: flex;
        justify-content: center;
      }
      #list > .panel > #content > *:not(:nth-child(1)) {
        margin-top: 4px;
      }
      #list > .panel > #content > *:not(:is(#unsupported, .success, .error)) {
        background-color: #38383880;
      }
      #list > .panel > #content {
        flex-direction: column;
        padding: 4px;
      }
      
      .success {
        background-color: #0f08;
      }
      .error {
        background-color: #f008;
      }
      
      a {
        display: contents;
      }
      button {
        margin: 1px;
        border-radius: 5px;
        background-color: rgb(0 0 0 / 0.875);
        border: 1px solid rgb(from currentcolor r g b / 0.5);
        display: flex;
        align-items: center;
        justify-content: center;
        min-width: 35px;
        min-height: 35px;
        overflow-x: clip;
        border-radius: calc(1px / 0);
        user-select: none;
      }
      button:hover {
        background-color: rgb(32 32 32 / 0.875);
      }
      button:active {
        background-color: rgb(64 64 64 / 0.875);
      }
      button > #icon {
        pointer-events: none;
        width: 20px;
        height: 20px;
      }
      button > :is(#icon, #text-display) {
        margin: 5px;
      }
      button > #icon + #text-display {
       margin-left: revert;
      }
    </style>
    <script type="module">
      const contentDiv = document.querySelector("#list")
      contentDiv.innerHTML = ""
      const importWOCode = `return import(url, options)`
      let importWO
      const _import = async (pel, type, mime) => {
        const el = document.createElement("div")
        el.innerText = mime
        pel.appendChild(el)
        const search = new URLSearchParams()
        search.set("accept", mime)
        let error
        try {
          const url = "/?" + search
          if (type === "javascript") await import(url)
          else {
            if (!importWO) importWO = Function("url", "options", importWOCode)
            await importWO(url, { with: { type } })
          }
        }
        catch (_) { error = true }
        el.classList.add(error ? "error" : "success")
      }
      const objs = {
        javascript: {
          displayName: "JavaScript",
          types: [
            "application/javascript",
            "text/javascript",
            "text/plain",
            "application/octet-stream"
          ]
        },
        css: {
          displayName: "CSS",
          types: [
            "text/css",
            "text/plain",
            "application/octet-stream"
          ]
        }
      }
      
      for (const [type, obj] of Object.entries(objs)) {
        const el1 = document.createElement("div")
        const el2 = document.createElement("div")
        const el3 = document.createElement("div")
        el2.innerText = obj.displayName
        el1.classList.add("panel")
        el2.id = "display-name"
        el3.id = "content"
        el1.append(el2, el3)
        for (const mime of obj.types) _import(el3, type, mime)
        if (type !== "javascript" && !importWO) {
          el3.innerHTML = '<span id="unsupported">' + (
            '<a href="https://developer.mozilla.org/en-US/docs/Web/JavaScript/Reference/Statements/import/with">' +
            "Import attributes</a> " +
            "are not supported in this browser."
          ) + "</span>"
        }
        contentDiv.append(el1)
      }
    </script>
  </head>
  <body>
    <a href="https://developer.mozilla.org/en-US/docs/Web/JavaScript/Guide/Modules">
      <span>ESM</span>
    </a>
    <div id="list">Not supported in this browser.</div>
    <div>
      <a href="https://github.com/Autist1Coder/ESM-MIME">
        <button id="gh">
          <svg id="icon">
            <use width="100%" height="100%" href="/github.svg" />
          </svg>
          <span id="text-display">GitHub</span>
        </button>
      </a>
    </div>
    <span id="copyright">
      &copy;2026 <a href="https://github.com/Autist1Coder">Autist1Coder</a>
    </span>
  </body>
</html>
